name: Build Windows App

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write

jobs:
  build:
    name: Publish self-contained Windows builds
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 8.0.x

      - name: Publish win-x64 and win-x86
        shell: pwsh
        run: ./scripts/publish-win.ps1

      - name: Set artifact names
        shell: pwsh
        env:
          PR_NUMBER: ${{ github.event.pull_request.number }}
        run: |
          if ($env:GITHUB_EVENT_NAME -eq "pull_request") {
            $prefix = "laser-marking-machine-app-pr-$env:PR_NUMBER"
          } else {
            $safeRefName = $env:GITHUB_REF_NAME -replace '[^A-Za-z0-9._-]', '-'
            $prefix = "laser-marking-machine-app-$safeRefName"
          }

          Add-Content -Path $env:GITHUB_ENV -Value "ARTIFACT_WIN_X64=$prefix-win-x64"
          Add-Content -Path $env:GITHUB_ENV -Value "ARTIFACT_WIN_X86=$prefix-win-x86"

      - name: Upload win-x64 artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ env.ARTIFACT_WIN_X64 }}
          path: dist/LaserMarkingApp-win-x64.exe
          if-no-files-found: error
          retention-days: 30

      - name: Upload win-x86 artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ env.ARTIFACT_WIN_X86 }}
          path: dist/LaserMarkingApp-win-x86.exe
          if-no-files-found: error
          retention-days: 30

      - name: Add workflow summary
        shell: pwsh
        run: |
          $runUrl = "$env:GITHUB_SERVER_URL/$env:GITHUB_REPOSITORY/actions/runs/$env:GITHUB_RUN_ID"
          $downloadNote = if ($env:GITHUB_EVENT_NAME -eq "pull_request") {
            "This pull request build uploaded temporary Actions artifacts. They expire after 30 days."
          } else {
            "This build uploaded Actions artifacts. Pushes to main also publish permanent GitHub Release assets."
          }

          $summary = @"
          ## Windows build downloads

          $downloadNote

          Workflow run: [$env:GITHUB_RUN_ID]($runUrl)

          Artifacts:
          - ``$env:ARTIFACT_WIN_X64`` contains ``LaserMarkingApp-win-x64.exe``
          - ``$env:ARTIFACT_WIN_X86`` contains ``LaserMarkingApp-win-x86.exe``
          "@

          Add-Content -Path $env:GITHUB_STEP_SUMMARY -Value $summary

      - name: Comment PR artifact link
        if: github.event_name == 'pull_request'
        uses: actions/github-script@v7
        continue-on-error: true
        with:
          script: |
            const runUrl = `${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`;
            const body = [
              'Windows preview build is available from this workflow run:',
              '',
              runUrl,
              '',
              'Download the artifacts from the run:',
              `- \`${process.env.ARTIFACT_WIN_X64}\` contains \`LaserMarkingApp-win-x64.exe\``,
              `- \`${process.env.ARTIFACT_WIN_X86}\` contains \`LaserMarkingApp-win-x86.exe\``,
              '',
              'These PR artifacts expire after 30 days. Production downloads are published from `main` under GitHub Releases.'
            ].join('\n');

            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              body
            });

      - name: Create GitHub Release
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        shell: pwsh
        env:
          GH_TOKEN: ${{ github.token }}
          RELEASE_TAG: build-${{ github.run_number }}
          RELEASE_TITLE: Laser Marking App Build ${{ github.run_number }}
        run: |
          $notes = @"
          Self-contained Windows builds.

          Commit: $env:GITHUB_SHA

          Downloads:
          - LaserMarkingApp-win-x64.exe
          - LaserMarkingApp-win-x86.exe
          "@

          gh release create $env:RELEASE_TAG `
            dist/LaserMarkingApp-win-x64.exe `
            dist/LaserMarkingApp-win-x86.exe `
            --title $env:RELEASE_TITLE `
            --notes $notes
